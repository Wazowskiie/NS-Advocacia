<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NS Advocacia — Agenda</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/agenda.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <div class="logo">
        <h1>NS Advocacia</h1>
        <p>Gestão Jurídica</p>
      </div>
      <nav class="nav">
        <div class="nav-section">
          <span class="nav-label">Principal</span>
          <a href="../index.html" class="nav-item" data-page="dashboard">
            <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Dashboard
          </a>
          <a href="processos.html" class="nav-item" data-page="processos">
            <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Processos
            <span class="badge" style="display:none">0</span>
          </a>
          <a href="clientes.html" class="nav-item" data-page="clientes">
            <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Clientes
          </a>
          <a href="agenda.html" class="nav-item active" data-page="agenda">
            <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Agenda
            <span class="badge badge--green" style="display:none">0</span>
          </a>

          <a href="monitoramento.html" class="nav-item" data-page="monitoramento">
          <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Monitoramento
          <span class="badge" id="badge-intimacoes">3</span>
          </a>
        </div>
        <div class="nav-section">
          <span class="nav-label">Financeiro</span>
          <a href="honorarios.html" class="nav-item" data-page="honorarios">
            <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Honorários
          </a>
          <a href="custas.html" class="nav-item" data-page="custas">
            <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            Custas
          </a>
        </div>
        <div class="nav-section">
          <span class="nav-label">Sistema</span>
          <a href="configuracoes.html" class="nav-item" data-page="configuracoes">
            <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M21 12h-2M5 12H3M12 21v-2M12 5V3"/></svg>
            Configurações
          </a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="avatar avatar--sm">RS</div>
        <div class="sidebar-user">
          <p class="sidebar-user__name">Rafael Silva</p>
          <p class="sidebar-user__role">Advogado Sócio</p>
        </div>
      </div>
    </aside>

    <div class="main">

      <!-- TOPBAR -->
      <header class="topbar">
        <div class="topbar__left">
          <h2 class="topbar__title">Agenda</h2>
          <div class="week-nav">
            <button class="week-btn" id="btn-prev">&#8249;</button>
            <span class="week-label" id="week-label"></span>
            <button class="week-btn" id="btn-next">&#8250;</button>
          </div>
          <button class="btn-hoje" id="btn-hoje">Hoje</button>
        </div>
        <div class="topbar__right">
          <select class="filter-select" id="f-responsavel">
            <option value="">Todos</option>
            <option value="Rafael Silva" selected>Rafael Silva</option>
            <option value="Beatriz Mendes">Beatriz Mendes</option>
            <option value="Thiago Carvalho">Thiago Carvalho</option>
          </select>
          <button class="btn btn--primary" id="btn-novo">+ Novo Evento</button>
        </div>
      </header>

      <!-- LEGENDA -->
      <div class="legenda">
        <span class="leg-item"><span class="leg-dot leg-dot--audiencia"></span>Audiência</span>
        <span class="leg-item"><span class="leg-dot leg-dot--reuniao"></span>Reunião com cliente</span>
        <span class="leg-item"><span class="leg-dot leg-dot--prazo"></span>Prazo processual</span>
        <span class="leg-item"><span class="leg-dot leg-dot--protocolo"></span>Protocolo</span>
        <span class="leg-item"><span class="leg-dot leg-dot--tarefa"></span>Tarefa interna</span>
      </div>

      <!-- GRADE -->
      <div class="calendar">
        <div class="cal-head" id="cal-head"></div>
        <div class="cal-body">
          <div class="cal-grid" id="cal-grid"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- MODAL NOVO EVENTO -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>Novo Evento</h3>
        <button class="modal-close" id="modal-close">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Título</label>
          <input type="text" id="f-titulo" placeholder="Ex: Audiência — TRT 2ª Região" />
        </div>
        <div class="form-group">
          <label>Descrição / Processo</label>
          <input type="text" id="f-sub" placeholder="Ex: Maria Fernanda Costa" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Tipo</label>
            <select id="f-tipo">
              <option value="audiencia">Audiência</option>
              <option value="reuniao">Reunião com cliente</option>
              <option value="prazo">Prazo processual</option>
              <option value="protocolo">Protocolo</option>
              <option value="tarefa">Tarefa interna</option>
            </select>
          </div>
          <div class="form-group">
            <label>Responsável</label>
            <select id="f-resp-modal">
              <option value="Rafael Silva">Rafael Silva</option>
              <option value="Beatriz Mendes">Beatriz Mendes</option>
              <option value="Thiago Carvalho">Thiago Carvalho</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="f-data" />
          </div>
          <div class="form-group">
            <label>Hora início</label>
            <input type="time" id="f-hora-ini" value="09:00" />
          </div>
          <div class="form-group">
            <label>Hora fim</label>
            <input type="time" id="f-hora-fim" value="10:00" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn--secondary" id="modal-cancel">Cancelar</button>
        <button class="btn btn--primary" id="modal-save">Salvar Evento</button>
      </div>
    </div>
  </div>
  <script src="../js/agenda-data.js"></script>
  <script src="../js/agenda.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/confirm.js"></script>
  <script src="../js/responsive.js"></script>
</body>
</html>
